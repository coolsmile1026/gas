<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天然气管道管径计算器</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { 
            background: #f0f4f8; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 8px;
        }
        .calculator-card {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 22px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.1);
            padding: 16px 18px;
        }
        h2 {
            margin: 0 0 8px 0;
            font-weight: 600;
            color: #0b2b4a;
            font-size: 1.6rem;
            text-align: center;
        }
        .sub {
            color: #3a5e7a;
            font-size: 0.8rem;
            margin-bottom: 12px;
            border-left: 3px solid #2b7fc1;
            padding-left: 10px;
            background: #f0f9ff;
            border-radius: 0 8px 8px 0;
            line-height: 1.3;
        }
        .input-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 14px;
        }
        .input-row {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: 500;
            color: #1e3b5c;
            margin-bottom: 3px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        input {
            padding: 10px 14px;
            border: 1.5px solid #dde7f0;
            border-radius: 14px;
            font-size: 0.9rem;
            background: #f9fcff;
        }
        input:focus {
            border-color: #2b7fc1;
            outline: none;
            background: white;
            box-shadow: 0 0 0 3px rgba(43,127,193,0.1);
        }
        .constant-section {
            background: #f0f5fa;
            border-radius: 12px;
            padding: 8px 10px;
            margin: 8px 0 12px;
            border-left: 3px solid #2b7fc1;
        }
        .constant-title {
            font-weight: 600;
            font-size: 0.8rem;
            color: #1e3b5c;
            margin-right: 6px;
            white-space: nowrap;
        }
        .constant-tags {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px;
        }
        .constant-item {
            background: white;
            padding: 3px 8px;
            border-radius: 20px;
            border: 1px solid #cbdae9;
            font-weight: 500;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        .result-area {
            background: #e7f1fa;
            border-radius: 16px;
            padding: 10px 12px;
            margin: 14px 0 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .result-label {
            font-size: 0.9rem;
            color: #0f3b5e;
            font-weight: 500;
        }
        .result-value-section {
            display: flex;
            align-items: baseline;
            gap: 4px;
        }
        .result-value {
            font-size: 2.2rem;
            font-weight: 700;
            color: #0c4e8c;
            line-height: 1;
        }
        .result-unit {
            font-size: 1rem;
            color: #3e6a97;
        }
        .dn-suggestion {
            font-size: 0.9rem;
            color: #2569a2;
            font-weight: 500;
            margin-left: 8px;
            white-space: nowrap;
        }
        .btn-calc {
            background: #1c6fb4;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(28,111,180,0.3);
        }
        .btn-calc:hover {
            background: #0f5a9a;
        }
    </style>
</head>
<body>
    <div class="calculator-card">
        <h2>🔧 燃气管径计算器</h2>
        <div class="sub">基于 GB 50251 (威莫斯公式) · 固定参数已内置</div>

        <!-- 固定参数一行显示 -->
        <div class="constant-section">
            <div style="display: flex; align-items: center; gap: 6px;">
                <span class="constant-title">📌固定参数：</span>
                <div class="constant-tags">
                    <span class="constant-item">Δ=0.6</span>
                    <span class="constant-item">Z=0.8</span>
                    <span class="constant-item">E=0.9</span>
                    <span class="constant-item">15℃</span>
                </div>
            </div>
        </div>

        <div class="input-grid">
            <div class="input-row">
                <label>📊 输气量 <span style="color:#1f6fb4;">(万方/年)</span></label>
                <input type="number" id="q" step="1" min="0" value="100000" placeholder="例: 100000">
            </div>
            <div class="input-row">
                <label>🔵 起点压力 P1 <span style="color:#1f6fb4;">(MPa)</span></label>
                <input type="number" id="p1" step="0.1" min="0" value="6.0" placeholder="例: 6.0">
            </div>
            <div class="input-row">
                <label>🔴 终点压力 P2 <span style="color:#1f6fb4;">(MPa)</span></label>
                <input type="number" id="p2" step="0.1" min="0" value="4.0" placeholder="例: 4.0">
            </div>
            <div class="input-row">
                <label>📏 管道长度 L <span style="color:#1f6fb4;">(km)</span></label>
                <input type="number" id="l" step="0.1" min="0" value="50" placeholder="例: 50">
            </div>
        </div>

        <button class="btn-calc" id="calculate">⚡ 计算推荐管径</button>

        <!-- 高度压缩的结果区域：一行显示标签、数值、DN建议 -->
        <div class="result-area" id="resultBox">
            <span class="result-label">推荐内径</span>
            <div style="display: flex; align-items: center; gap: 8px;">
                <div class="result-value-section">
                    <span class="result-value" id="diaValue">700</span>
                    <span class="result-unit">mm</span>
                </div>
                <span class="dn-suggestion" id="dnSuggestion">≈ DN800</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const qInp = document.getElementById('q');
            const p1Inp = document.getElementById('p1');
            const p2Inp = document.getElementById('p2');
            const lInp = document.getElementById('l');
            const diaSpan = document.getElementById('diaValue');
            const dnSpan = document.getElementById('dnSuggestion');
            const calcBtn = document.getElementById('calculate');

            const DELTA = 0.6;
            const Z = 0.8;
            const E = 0.9;
            const FIXED_TEMP_K = 15 + 273.15;

            const DN_LIST = [40, 50, 65, 80, 100, 125, 150, 200, 250, 300, 350, 400, 450, 500, 600, 700, 800, 900, 1000, 1200, 1400];

            function computeDiameter(q_wanPerYear, p1_mpa, p2_mpa, l_km) {
                if (q_wanPerYear <= 0 || p1_mpa <= 0 || p2_mpa <= 0 || l_km <= 0) return NaN;
                if (p1_mpa <= p2_mpa) return NaN;

                const q_m3perDay = q_wanPerYear * 10000 / 365;
                const pDiff = Math.pow(p1_mpa, 2) - Math.pow(p2_mpa, 2);
                if (pDiff <= 0) return NaN;

                const numerator = Math.pow(q_m3perDay, 2) * DELTA * Z * FIXED_TEMP_K * l_km;
                const denominator = Math.pow(1051, 2) * Math.pow(E, 2) * pDiff;
                if (denominator <= 0) return NaN;

                return Math.pow(numerator / denominator, 1/5) * 10;
            }

            function suggestDN(mm) {
                if (mm <= 0) return '参数无效';
                if (mm <= DN_LIST[0]) return `DN${DN_LIST[0]}`;
                for (let i = 0; i < DN_LIST.length; i++) {
                    if (DN_LIST[i] >= mm) return `DN${DN_LIST[i]}`;
                }
                return `DN${DN_LIST[DN_LIST.length-1]} 或更大`;
            }

            function updateResult() {
                const q = parseFloat(qInp.value);
                const p1 = parseFloat(p1Inp.value);
                const p2 = parseFloat(p2Inp.value);
                const l = parseFloat(lInp.value);

                if (isNaN(q) || isNaN(p1) || isNaN(p2) || isNaN(l)) {
                    diaSpan.innerText = '?';
                    dnSpan.innerText = '请输入完整参数';
                    return;
                }

                const d_mm = computeDiameter(q, p1, p2, l);
                if (isNaN(d_mm) || !isFinite(d_mm)) {
                    diaSpan.innerText = '—';
                    dnSpan.innerText = '参数不合理 (P1需>P2)';
                    return;
                }

                const rounded = Math.round(d_mm);
                diaSpan.innerText = rounded;
                dnSpan.innerText = `≈ ${suggestDN(rounded)}`;
            }

            calcBtn.addEventListener('click', updateResult);
            [qInp, p1Inp, p2Inp, lInp].forEach(inp => inp.addEventListener('input', updateResult));
            window.addEventListener('load', updateResult);
        })();
    </script>
</body>
</html>
